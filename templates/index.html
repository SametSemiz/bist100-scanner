<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIST100 BBAWE Tarayıcı</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
</head>
<body>
    <div class="glass-container container mt-5">
        <header class="text-center mb-4 pt-4">
            <h1 class="display-4 fw-bold gradient-text mb-3"><i class="fas fa-satellite-dish me-3"></i>BIST100 Tarayıcı</h1>
        </header>

        <div class="row justify-content-center mb-5">
            <div class="col-md-8">
                <div class="control-panel p-4 rounded-4 shadow">
                    <div class="row align-items-end">
                        <div class="col-md-8">
                            <label class="form-label text-light fw-semibold mb-3">Zaman Aralığı</label>
                            <div class="timeframe-selector d-flex flex-wrap gap-2 mb-4">
                                <input type="radio" class="btn-check" name="timeframe" id="tf_1d" value="1d" autocomplete="off" checked>
                                <label class="btn btn-outline-primary flex-fill" for="tf_1d">1 Gün</label>

                                <input type="radio" class="btn-check" name="timeframe" id="tf_4h" value="4h" autocomplete="off">
                                <label class="btn btn-outline-primary flex-fill" for="tf_4h">4 Saat</label>

                                <input type="radio" class="btn-check" name="timeframe" id="tf_2h" value="2h" autocomplete="off">
                                <label class="btn btn-outline-primary flex-fill" for="tf_2h">2 Saat</label>

                                <input type="radio" class="btn-check" name="timeframe" id="tf_1h" value="1h" autocomplete="off">
                                <label class="btn btn-outline-primary flex-fill" for="tf_1h">1 Saat</label>
                            </div>
                            
                            <label class="form-label text-light fw-semibold mb-3">Tarama Aralığı (Hisse Sırası)</label>
                            <select id="chunkSelect" class="form-select bg-dark text-light border-secondary">
                                <option value="0-50" selected>1 - 50 Arası</option>
                                <option value="50-100">51 - 100 Arası</option>
                                <option value="100-150">101 - 150 Arası</option>
                                <option value="150-200">151 - 200 Arası</option>
                                <option value="200-250">201 - 250 Arası</option>
                                <option value="250-300">251 - 300 Arası</option>
                                <option value="300-350">301 - 350 Arası</option>
                                <option value="350-400">351 - 400 Arası</option>
                                <option value="400-450">401 - 450 Arası</option>
                                <option value="450-500">451 - 500 Arası</option>
                                <option value="500-550">501 - 550 Arası</option>
                                <option value="550-611">551 - 611 Arası</option>
                                <option value="all">Tüm Hisseler (~611 Hisse)</option>
                            </select>
                        </div>
                        <div class="col-md-4 mt-4 mt-md-0 d-flex align-items-end">
                            <button id="scanBtn" class="btn btn-primary btn-lg w-100 scan-btn">
                                <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true"></span>
                                <i class="fas fa-search me-2"></i>Taramayı Başlat
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultsArea" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="text-light m-0"><i class="fas fa-cloud text-info me-2"></i>Mavi Bulutta Olan Hisseler</h3>
                <span class="badge bg-primary fs-6" id="scanStats"></span>
            </div>
            
            <div class="row" id="stockCards">
                <!-- Sonuçlar JS ile buraya yüklenecek -->
            </div>
        </div>
        <div class="text-center mt-5 mb-4 d-md-none">
            <button id="installPwaBtn" class="btn btn-outline-info rounded-pill px-4 py-2 d-none shadow-sm">
                <i class="fas fa-download me-2"></i>Uygulama Olarak İndir
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register("{{ url_for('static', filename='sw.js') }}");
        }
    </script>
</body>
</html>
